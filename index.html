<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ORION" />
  <meta name="theme-color" content="#F7F8FA" />
  <title>ORION — Budget</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand-row">
        <span class="brand-mark"><svg viewBox="0 0 24 24"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4z"/></svg></span>
        <div>
          <div class="brand">ORION</div>
          <p class="subtitle" id="monthLabel">Budget</p>
        </div>
      </div>
      <button class="ghost-btn" id="btnRefresh" title="Recalculer" aria-label="Recalculer">
        <svg viewBox="0 0 24 24"><path d="M20 11a8 8 0 1 0-.9 4.5"/><path d="M20 4v5h-5"/></svg>
      </button>
    </header>

    <main class="pages">
      <section class="page active" id="page-dashboard"></section>
      <section class="page" id="page-transactions"></section>
      <section class="page" id="page-stats"></section>
      <section class="page" id="page-goals"></section>
      <section class="page" id="page-settings"></section>
    </main>

    <nav class="bottom-nav" aria-label="Navigation principale">
      <button class="active" data-page="dashboard" aria-label="Accueil"><svg viewBox="0 0 24 24"><path d="M3 10.5 12 3l9 7.5V21h-6v-6H9v6H3z"/></svg><small>Accueil</small></button>
      <button data-page="transactions" aria-label="Lignes"><svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h10"/></svg><small>Lignes</small></button>
      <button data-page="stats" aria-label="Statistiques"><svg viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-7M22 20H2"/></svg><small>Stats</small></button>
      <button data-page="goals" aria-label="Objectifs"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8"/><circle cx="12" cy="12" r="3.4"/></svg><small>Objectifs</small></button>
      <button data-page="settings" aria-label="Réglages"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 13.5a7.7 7.7 0 0 0 0-3l1.8-1.4-1.9-3.2-2.1.9a7.5 7.5 0 0 0-2.6-1.5L14 3h-4l-.5 2.3a7.5 7.5 0 0 0-2.6 1.5l-2.1-.9L2.8 9.1l1.8 1.4a7.7 7.7 0 0 0 0 3L2.8 15l1.9 3.2 2.1-.9a7.5 7.5 0 0 0 2.6 1.5L10 21h4l.5-2.3a7.5 7.5 0 0 0 2.6-1.5l2.1.9 1.9-3.2z"/></svg><small>Réglages</small></button>
    </nav>
  </div>

  <button class="fab" id="globalAdd" title="Ajouter une ligne" aria-label="Ajouter">+</button>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>

  <!-- Feuille : transaction -->
  <section class="sheet" id="editorSheet" aria-hidden="true">
    <div class="handle"></div>
    <div class="sheet-head"><h2 id="sheetTitle">Ajouter une ligne</h2><button class="close-x" id="btnCloseSheet" aria-label="Fermer">×</button></div>
    <input type="hidden" id="editIndex" />
    <div class="segmented" id="typeTabs">
      <button data-type="expense" class="active">Dépense</button>
      <button data-type="income">Revenu</button>
    </div>
    <label>Libellé<input id="editName" type="text" placeholder="Ex : EDF, Salaire…" autocomplete="off" /></label>
    <label>Montant (€)<input id="editAmount" type="number" inputmode="decimal" step="0.01" placeholder="0,00" /></label>
    <label>Date prévue<input id="editDate" type="date" /></label>
    <label>Catégorie<select id="editCat"></select></label>
    <label class="checkline"><input id="editPaid" type="checkbox" /> Déjà confirmé / reçu</label>
    <div class="sheet-actions">
      <button class="danger" id="btnDelete">Supprimer</button>
      <button class="primary" id="btnSaveLine">Enregistrer</button>
    </div>
  </section>

  <!-- Feuille : objectif -->
  <section class="sheet" id="goalSheet" aria-hidden="true">
    <div class="handle"></div>
    <div class="sheet-head"><h2 id="goalSheetTitle">Objectif</h2><button class="close-x" id="btnCloseGoal" aria-label="Fermer">×</button></div>
    <input type="hidden" id="goalIndex" />
    <label>Nom<input id="goalName" type="text" placeholder="Ex : Voyage" autocomplete="off" /></label>
    <label>Icône<select id="goalEmoji"></select></label>
    <label>Montant cible (€)<input id="goalTarget" type="number" inputmode="decimal" step="1" placeholder="0" /></label>
    <label>Montant actuel (€)<input id="goalCurrent" type="number" inputmode="decimal" step="1" placeholder="0" /></label>
    <div class="sheet-actions">
      <button class="danger" id="btnDeleteGoal">Supprimer</button>
      <button class="primary" id="btnSaveGoal">Enregistrer</button>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
