<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#F7F8FA" />
  <title>ORION — Budget intelligent</title>
  <link rel="stylesheet" href="css/app.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <div class="brand-row"><span class="brand-mark">✦</span><span class="brand">ORION</span></div>
        <p class="subtitle" id="monthLabel">Budget intelligent</p>
      </div>
      <button class="ghost-btn" id="btnRefresh" title="Recalculer">↻</button>
    </header>

    <main>
      <section class="page active" id="page-dashboard"></section>
      <section class="page" id="page-transactions"></section>
      <section class="page" id="page-stats"></section>
      <section class="page" id="page-goals"></section>
      <section class="page" id="page-settings"></section>
    </main>

    <nav class="bottom-nav">
      <button class="active" data-page="dashboard"><span>🏠</span><small>Accueil</small></button>
      <button data-page="transactions"><span>💳</span><small>Lignes</small></button>
      <button data-page="stats"><span>📊</span><small>Stats</small></button>
      <button data-page="goals"><span>🎯</span><small>Objectifs</small></button>
      <button data-page="settings"><span>⚙️</span><small>Réglages</small></button>
    </nav>
  </div>

  <div class="sheet-backdrop" id="sheetBackdrop"></div>
  <section class="sheet" id="editorSheet" aria-hidden="true">
    <div class="handle"></div>
    <h2 id="sheetTitle">Modifier</h2>
    <input type="hidden" id="editType" />
    <input type="hidden" id="editIndex" />
    <label>Libellé<input id="editName" type="text" /></label>
    <label>Montant<input id="editAmount" type="number" step="0.01" /></label>
    <label>Date prévue<input id="editDate" type="date" /></label>
    <label>Catégorie<select id="editCat"></select></label>
    <div class="sheet-actions">
      <button class="secondary" id="btnCloseSheet">Annuler</button>
      <button class="danger" id="btnDelete">Supprimer</button>
      <button class="primary" id="btnSaveLine">Enregistrer</button>
    </div>
  </section>

  <script src="js/app.js"></script>
</body>
</html>
